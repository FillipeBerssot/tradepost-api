services:
  tradepost-db:
    image: postgres:16
    container_name: tradepost-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradepost
      POSTGRES_USER: tradepost
      POSTGRES_PASSWORD: tradepost123
    ports:
      - "5435:5432"
    volumes:
      - tradepost_postgres_data:/var/lib/postgresql/data

volumes:
  tradepost_postgres_data:
